<main class="section-shell flex min-h-screen items-center justify-center py-16">
    <section class="login-shell" data-reveal>
        <div class="space-y-4">
            <p class="eyebrow">Console</p>
            <h1 class="section-title">Sign in to PVE Cloud.</h1>
            <p class="section-copy">Use your directory credentials to manage projects, quotas, and access.</p>
        </div>

        {{if .LoginError}}
        <div class="rounded-2xl border border-[#d9b7af] bg-[#fff4f1] px-4 py-3 text-sm text-[#8c4030]">
            {{.LoginError}}
        </div>
        {{end}}

        <form action="/api/v1/auth/login" method="post" class="space-y-5">
            <input type="hidden" name="redirect" value="{{.Redirect}}" />

            <label class="field-group">
                <span class="field-label">Username</span>
                <input class="field-input" type="text" name="username" autocomplete="username" required />
            </label>

            <label class="field-group">
                <span class="field-label">Password</span>
                <input class="field-input" type="password" name="password" autocomplete="current-password" required />
            </label>

            <button type="submit" class="button-primary w-full justify-center">Sign In</button>
        </form>
    </section>
</main>
