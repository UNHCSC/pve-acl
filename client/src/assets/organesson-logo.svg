    <path d="M256 208v55M201 303l55-40 55 40" fill="none" stroke="#f8fafc" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="256" cy="190" r="35" fill="url(#node)" />
    <circle cx="181" cy="318" r="32" fill="url(#node)" />
    <circle cx="331" cy="318" r="32" fill="url(#node)" />
    <circle cx="256" cy="264" r="25" fill="#263746" />
