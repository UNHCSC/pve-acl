<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
    <title id="title">Organesson Cloud logo</title>
    <desc id="desc">A rounded square mark with a connected organization tree inside an orange O.</desc>
    <defs>
        <linearGradient id="bg" x1="84" y1="56" x2="430" y2="456" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#2b3a46" />
            <stop offset="1" stop-color="#131a21" />
        </linearGradient>
        <linearGradient id="ring" x1="126" y1="106" x2="392" y2="416" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#ffb15a" />
            <stop offset="0.48" stop-color="#e57000" />
            <stop offset="1" stop-color="#b84d00" />
        </linearGradient>
        <linearGradient id="node" x1="166" y1="146" x2="348" y2="360" gradientUnits="userSpaceOnUse">
